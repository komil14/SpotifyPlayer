services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: /api
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
