services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    expose:
      - "8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8081}:80"
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
